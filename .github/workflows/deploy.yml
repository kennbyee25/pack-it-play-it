name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Needs write access to push the built site to the gh-pages branch.
permissions:
  contents: write

# One concurrent deploy; don't cancel an in-progress production rollout.
concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (production, served at /pack-it-play-it/)
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: SPA fallback (client-side routing)
        run: cp dist/index.html dist/404.html

      # Publish to the repo root of gh-pages. keep_files preserves the
      # pr-preview/ subtrees managed by the preview workflow so production
      # deploys never wipe live PR previews.
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: production ${{ github.sha }}"
