name: PR Preview

# Per-PR ephemeral environments. Each open PR is built and published to
# https://kennbyee25.github.io/pack-it-play-it/pr-preview/pr-<N>/ and torn
# down automatically when the PR is closed or merged.
on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

# Write access to push/remove the preview subtree on the gh-pages branch.
permissions:
  contents: write
  pull-requests: write

# Serialize per-PR so rapid pushes don't race on the gh-pages branch.
concurrency:
  group: pages-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip the build entirely on close — the action only needs to delete the
      # subtree in that case.
      - if: github.event.action != 'closed'
        run: npm ci

      - name: Build (served at /pack-it-play-it/pr-preview/pr-<N>/)
        if: github.event.action != 'closed'
        env:
          PAGES_BASE: /pack-it-play-it/pr-preview/pr-${{ github.event.number }}/
        run: npm run build

      - name: SPA fallback (client-side routing)
        if: github.event.action != 'closed'
        run: cp dist/index.html dist/404.html

      - name: Deploy / teardown preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
